# =============================================================================
# Nginx Reverse Proxy Configuration
# =============================================================================
# Routes all traffic through a single entry point.
#
# Why nginx in front of the gateway?
#   - SSL termination (handled here, not in Python)
#   - Static file serving (if needed later)
#   - Rate limiting at the edge
#   - Load balancing across multiple gateway instances (Task 8)
# =============================================================================

upstream api_gateway {
    server api-gateway:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;

    # API requests → API Gateway
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # SSE support (streaming endpoints)
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check → API Gateway
    location /health {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # OpenAPI docs → API Gateway
    location /docs {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://api_gateway;
        proxy_set_header Host $host;
    }

    # Frontend SPA → Frontend service
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Nginx health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
