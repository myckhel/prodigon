# =============================================================================
# Docker Compose — Production AI System
# =============================================================================
# Run: docker-compose up --build
#
# Services:
#   - api-gateway    :8000  — public entry point
#   - model-service  :8001  — LLM inference (Groq API)
#   - worker-service :8002  — background job processing
#   - nginx          :80    — reverse proxy
#   - redis          :6379  — queue backend (optional, for Task 8)
# =============================================================================

services:
  # --- Reverse Proxy ---
  nginx:
    build:
      context: ./infra
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - frontend
    networks:
      - ai-platform-net

  # --- API Gateway ---
  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - MODEL_SERVICE_URL=http://model-service:8001
      - WORKER_SERVICE_URL=http://worker-service:8002
    depends_on:
      - model-service
      - worker-service
    networks:
      - ai-platform-net

  # --- Model Service ---
  model-service:
    build:
      context: .
      dockerfile: model_service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    networks:
      - ai-platform-net

  # --- Worker Service ---
  worker-service:
    build:
      context: .
      dockerfile: worker_service/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - MODEL_SERVICE_URL=http://model-service:8001
    depends_on:
      - model-service
    networks:
      - ai-platform-net

  # --- Frontend ---
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - ai-platform-net

  # --- Redis (optional, used in Task 8) ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - ai-platform-net

networks:
  ai-platform-net:
    driver: bridge
