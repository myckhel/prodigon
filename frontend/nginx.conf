# ---------------------------------------------------------------------------
# nginx configuration for serving the Prodigon SPA
# ---------------------------------------------------------------------------
# Key behaviors:
#   - All unmatched routes fall back to index.html (SPA client-side routing)
#   - Static assets in /assets/ get long-lived cache headers (Vite hashes them)
#   - Gzip compression for text-based assets

server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # SPA fallback — any route that doesn't match a real file returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite puts hashed bundles in /assets/ — cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
